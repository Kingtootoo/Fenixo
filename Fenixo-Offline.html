<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fenixo Browser - Offline</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    // Check if the user is offline or online
    window.addEventListener('load', () => {
      if (navigator.onLine) {
        console.log("You are online.");
      } else {
        alert("You are offline. Some features may not work.");
      }
    });

    // Function to navigate to settings
    function goToSettings() {
      if (navigator.onLine) {
        window.location.href = "settings.html";  // Redirect to settings if online
      } else {
        alert("You are offline. Cannot access settings.");
      }
    }

    // Function to navigate to the home page
    function goHome() {
      if (navigator.onLine) {
        window.location.href = "index.html";  // Redirect to home if online
      } else {
        alert("You are offline. Cannot go home.");
      }
    }

    // Function to check for updates
    function checkForUpdates() {
      if (navigator.onLine) {
        alert("Checking for updates...");
        // Place code here to check for updates from an API or server
        // For example, you could call an API to check for updates
      } else {
        alert("You are offline. Cannot check for updates.");
      }
    }
  </script>
</head>

<body>
  <header>
    <h1>Fenixo Browser - Offline Mode</h1>
    <p>You are currently offline, but you can still browse local files.</p>
  </header>

  <main>
    <div class="buttons">
      <button id="settings-btn" onclick="goToSettings()">Settings</button>
      <button id="home-btn" onclick="goHome()">Go Home</button>
      <button id="updates-btn" onclick="checkForUpdates()">Check for Updates</button>
    </div>
  </main>

  <footer>
    <p>Fenixo Browser - Offline</p>
  </footer>

</body>

</html>
