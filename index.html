<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenixo</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .top-bar {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px;
            background: #222;
        }
        .search-container {
            display: flex;
            align-items: center;
            background: white;
            padding: 5px;
            border-radius: 5px;
            width: 50%;
        }
        input {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            border: none;
            outline: none;
        }
        .menu {
            cursor: pointer;
            padding: 10px;
            background-color: orange;
            border-radius: 5px;
            position: absolute;
            right: 20px;
            top: 10px;
        }
        .dropdown {
            display: none;
            position: absolute;
            right: 20px;
            top: 50px;
            background: #222;
            border-radius: 5px;
            padding: 10px;
            z-index: 10;
        }
        .dropdown a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 5px 0;
        }
        .ai-button {
            position: absolute;
            bottom: 50px;
            right: 20px;
            background-color: orange;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
        }
        .footer {
            position: absolute;
            bottom: 20px;
            display: flex;
            align-items: center;
        }
        .footer img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="search-container">
            <input type="text" id="search" placeholder="Search Google..." onkeypress="handleKeyPress(event)">
        </div>
    </div>
    
    <div class="menu" onclick="toggleMenu()">⋮</div>
    <div class="dropdown" id="menuDropdown">
        <a href="#" onclick="downloadFenixo()">Download Fenixo Offline</a>
    </div>
    
    <div class="ai-button" onclick="openAI()">🤖</div>
    
    <div class="footer">
        <img src="github-icon.png" alt="GitHub" onclick="window.location.href='https://github.com/kingtootoo'">
        <span>Made by Kingtootoo</span>
    </div>
    
    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchGoogle();
            }
        }
        function searchGoogle() {
            let query = document.getElementById('search').value;
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }
        function toggleMenu() {
            let dropdown = document.getElementById('menuDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }
        function downloadFenixo() {
            alert('Downloading Fenixo Offline...');
        }
        function openAI() {
            alert('Fenixo AI (Experimental) coming soon!');
        }
    </script>
</body>
</html>
