<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenixo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-bar">
        <div class="search-container">
            <input type="text" id="search" placeholder="Search the web..." onkeypress="handleKeyPress(event)">
        </div>
        <div class="menu" onclick="toggleMenu()">⋮</div>
    </div>
    
    <div class="dropdown" id="menuDropdown">
        <a href="#" onclick="downloadFenixo()">Download Fenixo Offline</a>
    </div>
    
    <div class="ai-button" onclick="openAI()">Fenixo A.I.</div>
    
    <div class="footer">
        <img src="github-icon.png" alt="GitHub" onclick="window.location.href='https://github.com/kingtootoo'">
        <span>Made by Kingtootoo</span>
    </div>
    
    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchWeb();
            }
        }
        function searchWeb() {
            let query = document.getElementById('search').value;
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }
        function toggleMenu() {
            let dropdown = document.getElementById('menuDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }
        function downloadFenixo() {
            alert('Downloading Fenixo Offline...');
        }
        function openAI() {
            alert('Fenixo AI (Experimental) is under development!');
        }
    </script>
</body>
</html>
