<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenixo</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .search-container {
            display: flex;
            align-items: center;
            width: 60%;
        }
        input {
            flex-grow: 1;
            padding: 10px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
        }
        button {
            margin-left: 10px;
            padding: 10px;
            font-size: 16px;
            background-color: orange;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .footer {
            position: absolute;
            bottom: 20px;
            display: flex;
            align-items: center;
        }
        .footer img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Fenixo</h1>
    <div class="search-container">
        <input type="text" id="search" placeholder="Search Google...">
        <button onclick="searchGoogle()">Search</button>
    </div>
    
    <div class="footer">
        <img src="github-icon.png" alt="GitHub" onclick="window.location.href='https://github.com/kingtootoo'">
        <span>Made by Kingtootoo</span>
    </div>

    <script>
        function searchGoogle() {
            let query = document.getElementById('search').value;
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }
    </script>
</body>
</html>

</body>
</html>
