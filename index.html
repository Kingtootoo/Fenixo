<script>
  // Wait for the page to load before adding event listeners
  document.addEventListener("DOMContentLoaded", function () {

    // Button for fullscreen toggle
    document.querySelector(".fullscreen-button").addEventListener("click", function () {
      toggleFullscreen();
    });

    // Button for opening Fenixo AI
    document.querySelector(".wrench-buttonaa").addEventListener("click", function () {
      openFenixoAI();
    });

    // Button for opening settings
    document.querySelector(".settings-buttonaa").addEventListener("click", function () {
      openSettings();
    });

    // Button for the menu (dropdown)
    document.querySelector(".menu-buttonaa").addEventListener("click", function () {
      toggleDropdownccc();
    });

    // Optional: Open Modal when "Generate Session's Data URL" is clicked
    document.querySelector("#dataURL").addEventListener("click", function () {
      generateDataURL();
    });
  });

  // Function to toggle fullscreen (useful for web apps)
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }
  }

  // Dummy function to open Fenixo AI (Replace with actual functionality)
  function openFenixoAI() {
    alert("Opening Fenixo AI!");
    // Here, you can add functionality to open or activate the AI
  }

  // Dummy function to open Settings (Replace with actual functionality)
  function openSettings() {
    alert("Opening Settings!");
    // Here, you can add functionality to open the settings page
  }

  // Function to toggle the dropdown menu
  function toggleDropdownccc() {
    var dropdown = document.getElementById("myDropdownccc");
    dropdown.classList.toggle("show");
  }

  // Dummy function for session data URL generation
  function generateDataURL() {
    alert("Generating session data URL!");
    // Here you can replace with actual logic for generating a session URL
  }
</script>
